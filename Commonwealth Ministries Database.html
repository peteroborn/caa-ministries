<title>Commonwealth Ministries Database</title>
<style>
:root{--black:#111;--gd:#555;--gm:#999;--gl:#e8e8e8;--bg:#fcfbf9;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--black);}
header{background:var(--white);padding:16px 28px;border-bottom:1px solid var(--gl);}
header h1{font-size:1.15rem;font-weight:600;}
header p{font-size:0.73rem;color:var(--gm);margin-top:3px;}
.filters{background:#f2f1ef;border-bottom:1px solid var(--gl);padding:14px 28px;display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:0.68rem;font-weight:600;color:var(--gd);text-transform:uppercase;letter-spacing:0.06em;}
select{border:1px solid var(--gl);border-radius:3px;padding:8px 10px;font-size:0.82rem;font-family:inherit;background:var(--white);color:var(--black);min-width:160px;cursor:pointer;}
.chips{display:flex;flex-wrap:wrap;gap:5px;max-width:520px;}
.chip{display:inline-block;padding:5px 10px;border-radius:3px;font-size:0.74rem;font-weight:500;border:1px solid var(--gl);background:var(--white);color:var(--gd);cursor:pointer;}
.chip:hover{border-color:var(--black);color:var(--black);}
.chip.on{background:var(--black);color:var(--white);border-color:var(--black);}
.cl{margin-top:4px;font-size:0.72rem;color:var(--gm);}
.cl span{cursor:pointer;margin-right:8px;}
.cl span:hover{color:var(--black);}
.fa{display:flex;flex-direction:column;gap:6px;padding-top:18px;}
.btn-r{background:transparent;border:1px solid var(--gm);border-radius:3px;padding:7px 14px;font-size:0.78rem;font-family:inherit;color:var(--gd);cursor:pointer;}
.btn-r:hover{border-color:var(--black);color:var(--black);}
.tog{display:flex;border:1px solid var(--gl);border-radius:3px;overflow:hidden;}
.tb{background:var(--white);color:var(--gd);border:none;padding:7px 11px;font-size:0.74rem;font-family:inherit;font-weight:500;cursor:pointer;}
.tb.on{background:var(--black);color:var(--white);}
.rb{padding:10px 28px;font-size:0.82rem;color:var(--gd);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gl);background:var(--white);flex-wrap:wrap;gap:8px;}
.rb strong{color:var(--black);}
.rbr{display:flex;gap:8px;align-items:center;}
.ab{background:var(--black);color:var(--white);border:none;border-radius:3px;padding:6px 12px;font-size:0.75rem;font-family:inherit;font-weight:500;cursor:pointer;}
.ab:hover{background:#333;}
.pag{display:flex;gap:6px;align-items:center;}
.pb{background:transparent;border:1px solid var(--gl);border-radius:3px;padding:4px 10px;font-size:0.78rem;font-family:inherit;color:var(--black);cursor:pointer;}
.pb:hover{border-color:var(--black);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
thead{background:var(--black);color:var(--white);}
th{padding:10px 14px;text-align:left;white-space:nowrap;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;cursor:pointer;user-select:none;}
th:hover{background:#2a2a2a;}
th.sorted{background:#333;}
tbody tr{border-bottom:1px solid var(--gl);}
tbody tr:hover{background:#f4f3f1;}
td{padding:9px 14px;vertical-align:top;line-height:1.45;}
.cr{font-size:0.73rem;color:var(--gm);white-space:nowrap;}
.cc{font-weight:600;white-space:nowrap;}
.cm{font-weight:500;}
.cd{color:var(--gd);font-size:0.8rem;}
.tags{display:flex;flex-wrap:wrap;gap:3px;}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.68rem;font-weight:600;background:var(--black);color:var(--white);}
.tagu{background:var(--gl);color:var(--gd);}
a.ww{color:var(--black);text-decoration:underline;font-size:0.76rem;}
.empty{text-align:center;padding:48px;color:var(--gm);font-style:italic;}
@media print{.filters,.rb{display:none!important;}body{background:#fff;}.tag{border:1px solid #111;background:none!important;color:#111!important;}}
</style>
</head>

<header>

</header>

    <div class="fl">Country</div>

  </div>
  <div class="fg">

    <div class="chips" id="chips"></div>
    <div class="cl">

      <span onclick="clrAll()">Clear</span>
      <span onclick="doUntag()" id="uBtn">Untagged only</span>

  </div>
  <div class="fa">
    <div class="tog">
      <button class="tb on" id="bM" onclick="setView('m')">Ministries only</button>
      <button class="tb" id="bD" onclick="setView('d')">Ministries &amp; Departments</button>
    </div>
    <button class="btn-r" onclick="resetAll()">Reset all</button>
  </div>
</div>
<div class="rb">
  <span>Showing <strong id="cnt">-</strong> <span id="cLbl">ministries</span></span>
  <div class="rbr">
    <button class="ab" onclick="doExport()">&#8681; Export CSV</button>
    <button class="ab" onclick="doPrint()">&#9113; Print</button>
    <div class="pag">
      <button class="pb" onclick="pg(-1)">&larr;</button>
      <span id="pInfo">Page 1</span>
      <button class="pb" onclick="pg(1)">&rarr;</button>
    </div>
  </div>
</div>

function init(){
  var i,o;
  var sr=document.getElementById('selR');
  for(i=0;i<REG.length;i++){o=document.createElement('option');o.value=REG[i];o.textContent=REG[i];sr.appendChild(o);}
  sr.onchange=function(){refC();go();};
  refC();
  document.getElementById('selC').onchange=go;
  var el=document.getElementById('chips');
  for(i=0;i<SEC.length;i++){
    (function(s){
      var d=document.createElement('div');
      d.className='chip';
      d.textContent=s;
      d.onclick=function(){togS(s,d);};
      el.appendChild(d);
    })(SEC[i]);
  }
  go();
}

function togS(s,el){
  untagOnly=false;document.getElementById('uBtn').style.fontWeight='400';
  var idx=-1,i;
  for(i=0;i<selSec.length;i++){if(selSec[i]===s){idx=i;break;}}
  if(idx>=0){selSec.splice(idx,1);el.className='chip';}
  else{selSec.push(s);el.className='chip on';}
  go();
}

function selAll(){
  untagOnly=false;document.getElementById('uBtn').style.fontWeight='400';
  selSec=SEC.slice();
  var cs=document.getElementById('chips').childNodes;
  for(var i=0;i<cs.length;i++)cs[i].className='chip on';
  go();
}

function clrAll(){
  untagOnly=false;document.getElementById('uBtn').style.fontWeight='400';
  selSec=[];
  var cs=document.getElementById('chips').childNodes;
  for(var i=0;i<cs.length;i++)cs[i].className='chip';
  go();
}

function doUntag(){
  selSec=[];
  var cs=document.getElementById('chips').childNodes;
  for(var i=0;i<cs.length;i++)cs[i].className='chip';
  untagOnly=!untagOnly;
  document.getElementById('uBtn').style.fontWeight=untagOnly?'700':'400';
  go();
}

function refC(){
  var rv=document.getElementById('selR').value;
  var el=document.getElementById('selC');
  el.innerHTML='<option value="">All Countries</option>';
  var seen={},names=[],i,r;
  for(i=0;i<REC.length;i++){
    r=REC[i];
    if(rv&&r.region!==rv)continue;
    if(r.country&&!seen[r.country]){seen[r.country]=1;names.push(r.country);}
  }
  names.sort();
  for(i=0;i<names.length;i++){var o=document.createElement('option');o.value=names[i];o.textContent=names[i];el.appendChild(o);}
}

function go(){
  var rv=document.getElementById('selR').value;
  var cv=document.getElementById('selC').value;
  var i,j,k,r,ok;
  filt=[];
  for(i=0;i<REC.length;i++){
    r=REC[i];
    if(rv&&r.region!==rv)continue;
    if(cv&&r.country!==cv)continue;
    if(untagOnly){if(r.sectors.length>0)continue;}
    else if(selSec.length>0){
      ok=false;
      for(j=0;j<selSec.length;j++){
        for(k=0;k<r.sectors.length;k++){
          if(r.sectors[k]===selSec[j]){ok=true;break;}
        }
        if(ok)break;
      }
      if(!ok)continue;
    }
    filt.push(r);
  }
  srt();page=1;bld();drw();
}

function srt(){
  if(!sCol){
    filt.sort(function(a,b){
      var r=sc(a.region,b.region);if(r)return r;
      var c=sc(a.country,b.country);if(c)return c;
      return sc(a.department,b.department);
    });
  } else {
    filt.sort(function(a,b){return sc(a[sCol],b[sCol])*sDir;});
  }
}

function sc(a,b){a=(a||'').toLowerCase();b=(b||'').toLowerCase();return a<b?-1:a>b?1:0;}

function setSort(col){
  var ok=false,i;
  for(i=0;i<SC.length;i++){if(SC[i]===col){ok=true;break;}}
  if(!ok)return;
  if(sCol===col){sDir*=-1;}else{sCol=col;sDir=1;}
  srt();page=1;bld();drw();
}

function setView(v){
  view=v;
  document.getElementById('bM').className='tb'+(v==='m'?' on':'');
  document.getElementById('bD').className='tb'+(v==='d'?' on':'');
  page=1;bld();drw();
}

function bld(){
  if(view==='d'){disp=filt;return;}
  var seen={},rows=[],i,j,k,r,has;
  for(i=0;i<filt.length;i++){
    r=filt[i];
    var key=(r.region||'')+'|'+(r.country||'')+'|'+(r.department||'');
    if(!seen[key]){
      seen[key]={region:r.region,country:r.country,department:r.department,primaryWWW:r.primaryWWW,sectors:r.sectors.slice()};
      rows.push(seen[key]);
    } else {
      for(j=0;j<r.sectors.length;j++){
        has=false;
        for(k=0;k<seen[key].sectors.length;k++){if(seen[key].sectors[k]===r.sectors[j]){has=true;break;}}
        if(!has)seen[key].sectors.push(r.sectors[j]);
      }
    }
  }
  disp=rows;
}

function resetAll(){
  document.getElementById('selR').value='';
  document.getElementById('selC').value='';
  selSec=[];untagOnly=false;sCol='';sDir=1;
  var cs=document.getElementById('chips').childNodes;
  for(var i=0;i<cs.length;i++)cs[i].className='chip';
  document.getElementById('uBtn').style.fontWeight='400';
  refC();go();
}

function E(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tgs(sec){
  if(!sec||sec.length===0)return '<span class="tag tagu">Untagged</span>';
  var t='',i;
  for(i=0;i<sec.length;i++)t+='<span class="tag">'+E(sec[i])+'</span>';
  return t;
}

function drw(){
  var isM=view==='m';
  var cols=isM?MC:DC;
  var i,j,c,r,html,lbl,sortable,isSorted,arrow,cls,w,domain,th;
  document.getElementById('cnt').textContent=disp.length.toLocaleString();
  document.getElementById('cLbl').textContent=isM?'ministries':'departments';

  th=document.getElementById('th');
  var tr=document.createElement('tr');
  for(i=0;i<cols.length;i++){
    c=cols[i];lbl=CL[c];
    sortable=false;for(j=0;j<SC.length;j++){if(SC[j]===c){sortable=true;break;}}
    isSorted=sCol===c;
    var thEl=document.createElement('th');
    if(isSorted)thEl.className='sorted';
    arrow=sortable?' '+(isSorted?(sDir===1?'\u25b2':'\u25bc'):'\u25b3'):'';
    thEl.innerHTML=lbl+arrow;
    if(sortable){
      (function(col){thEl.onclick=function(){setSort(col);};})(c);
    }
    tr.appendChild(thEl);
  }
  th.innerHTML='';
  th.appendChild(tr);

  var total=Math.max(1,Math.ceil(disp.length/PER));
  if(page>total)page=total;
  document.getElementById('pInfo').textContent='Page '+page+' of '+total;

  var sl=disp.slice((page-1)*PER,page*PER);
  var tbody=document.getElementById('tb');
  if(sl.length===0){tbody.innerHTML='<tr><td colspan="'+cols.length+'" class="empty">No results.</td></tr>';return;}

  html='';
  for(i=0;i<sl.length;i++){
    r=sl[i];html+='<tr>';
    for(j=0;j<cols.length;j++){
      c=cols[j];
      if(c==='sectors'){html+='<td><div class="tags">'+tgs(r.sectors)+'</div></td>';}
      else if(c==='primaryWWW'){
        w='';
        if(r.primaryWWW){domain=String(r.primaryWWW).replace(/^https?:\/\//,'').split('/')[0];w='<a class="ww" href="'+E(r.primaryWWW)+'" target="_blank">'+E(domain)+'</a>';}
        html+='<td>'+w+'</td>';
      } else {
        cls=c==='region'?'cr':c==='country'?'cc':c==='department'?'cm':'cd';
        html+='<td class="'+cls+'">'+E(r[c])+'</td>';
      }
    }
    html+='</tr>';
  }
  tbody.innerHTML=html;
}

function pg(d){
  var total=Math.max(1,Math.ceil(disp.length/PER));
  page=Math.max(1,Math.min(total,page+d));
  drw();window.scrollTo(0,0);
}

function doExport(){
  if(!disp.length){alert('No results.');return;}
  var isM=view==='m',cols=isM?MC:DC,i,r,rows,row;
  rows=[cols.map(function(c){return CL[c];})];
  for(i=0;i<disp.length;i++){
    r=disp[i];
    row=cols.map(function(c){if(c==='sectors')return r.sectors.join('; ');return r[c]||'';});
    rows.push(row.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}));
  }
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='Commonwealth_Ministries.csv';a.click();URL.revokeObjectURL(u);
}

  if(!disp.length){alert('No results.');return;}

    rows+='<tr>'+cols.map(function(c){
